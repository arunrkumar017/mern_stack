<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMS</title>
</head>
<body>
    <p><h1>FORMS</h1></p>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name"><br><br>

        <label for="email">Email-id:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password"><br><br>

        <label for="Language" style="line-height: 2;">Language:</label><br>
        <input type="radio" id="HTML" name="Language" value="HTML">
        <label for="HTML">HTML</label><br>

        <input type="radio" id="CSS" name="Language" value="CSS">
        <label for="CSS">CSS</label><br>

        <input type="radio" id="JavaScript" name="Language" value="JavaScript">
        <label for="JavaScript">JavaScript</label><br><br>

        <label for="Courses" style="line-height: 2;">Courses:</label><br>
        <input type="checkbox" id="Java Stack" name="Courses" value="Java Stack">
        <label for="Java Stack">Java Stack</label><br>

        <input type="checkbox" id="MERN Stack" name="Courses" value="MERN Stack">
        <label for="MERN Stack">MERN Stack</label><br>

        <input type="checkbox" id="Data Science" name="Courses" value="Data Science">
        <label for="Data Science">Data Science</label><br><br>


        <label for="field">field :</label>
        <select id="field" name="field">
            <option value="select">Select</option>
            <option value="HTML">HTML</option>
            <option value="CSS">CSS</option>
            <option value="JavaScript">JavaScript</option>
        </select><br><br>

        <label for="message">Message:</label>
        <textarea id="message" name="message" placeholder="Describe yourself"></textarea><br><br>

        <label for="Date">Date of birth :</label>
        <input type="date" id="Date" name="Date"><br><br>

        <label for="phone">Phone No.:</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number"><br><br>
        
        <input type="submit" value="Submit"><br>


        <a href="TableFileAssignment2.html" style="line-height: 5;" style="color: purple;" >Click here for Table file</a>
    </form>
</body>
</html>
